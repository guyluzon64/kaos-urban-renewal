name: update-public-data

on:
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Refresh official public data
        run: python scripts/update_public_data.py

      - name: Commit refreshed data when it changed
        shell: bash
        run: |
          if git diff --quiet -- data/metadata data/processed; then
            echo "No public-data changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/metadata/source_inventory.csv
          git add data/metadata/latest_refresh_report.csv
          git add data/processed/urban_renewal_raw_collected.csv
          git add data/processed/urban_renewal_standardized.csv
          git add data/processed/urban_renewal_public.csv
          git commit -m "Update public urban renewal data"
          git push

      # If an organization policy blocks commit-back, set the workflow's
      # repository permission to "Read and write" under:
      # Settings -> Actions -> General -> Workflow permissions.

